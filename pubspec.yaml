name: riaya_smart
description: RIAYA SMART - Couveuse Intelligente Connectée pour Bébés Prématurés
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:

  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # State management (choisissez selon vos préférences)
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  # Navigation
  go_router: ^12.0.0
  # Network
  dio: ^5.3.2
  # Storage local
  shared_preferences: ^2.2.1
  flutter_secure_storage: ^9.0.0
  # Utils
  intl: ^0.18.1
  firebase_core: ^3.1.0
  cloud_firestore: ^5.0.1
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.0.0
  webview_flutter: ^4.13.1
  flutter_mjpeg: ^2.0.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

webview_flutter: ^4.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/logo.png
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Black.ttf
          weight: 900